name: Build & Deploy (SAM)

on:
  push:
    branches: ["master"]

permissions:
  id-token: write
  contents: read
  checks: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven


      - name: Run tests and quality gate
        run: |
          set -o pipefail
          ./mvnw -B -ntp clean verify pitest:mutationCoverage | tee maven.log

      - name: Publish Unit Test Results (Surefire)
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Tests (Surefire)
          path: target/surefire-reports/TEST-*.xml
          reporter: java-junit

      - name: Publish Integration Test Results (Failsafe)
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Integration Tests (Failsafe)
          path: target/failsafe-reports/TEST-*.xml
          reporter: java-junit

      - name: Upload Surefire reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports
          path: target/surefire-reports

      - name: Upload Failsafe reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: failsafe-reports
          path: target/failsafe-reports

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco

      - name: Upload PIT report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pit-report
          path: target/pit-reports

  deploy:
    needs: test
    if: needs.test.result == 'success'
    runs-on: ubuntu-latest
    env:
      SAM_STACK_NAME: ${{ vars.SAM_STACK_NAME }}
      BUDGETBOT_SECRET_ARN: ${{ secrets.BUDGETBOT_SECRET_ARN }}
      BUDGETBOT_KMS_KEY_ARN: ${{ vars.BUDGETBOT_KMS_KEY_ARN }}
      LEGACY_KMS_KEY_ARN: ${{ vars.LEGACY_KMS_KEY_ARN }}
      DYNAMODB_RECIPIENTS_TABLE: ${{ vars.DYNAMODB_RECIPIENTS_TABLE }}
      DYNAMODB_BALANCE_STATE_TABLE: ${{ vars.DYNAMODB_BALANCE_STATE_TABLE }}
      DYNAMODB_YNAB_CONNECTIONS_TABLE: ${{ vars.DYNAMODB_YNAB_CONNECTIONS_TABLE }}
      SPRING_PROFILE: ${{ vars.SPRING_PROFILE }}
      DAILY_SCHEDULE: ${{ vars.DAILY_SCHEDULE }}
      DAILY_SCHEDULE_TIMEZONE: ${{ vars.DAILY_SCHEDULE_TIMEZONE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install AWS SAM CLI
        run: |
          python -m pip install --upgrade pip
          pip install aws-sam-cli

      - name: SAM build
        run: |
          set -o pipefail
          SAM_CLI_TELEMETRY=0 sam build --use-container --debug 2>&1 | tee sam-build.log

      - name: Upload SAM build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sam-build-log
          path: sam-build.log

      - name: SAM deploy
        run: |
          sam deploy \
            --stack-name "$SAM_STACK_NAME" \
            --region "$AWS_REGION" \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --resolve-s3 \
            --parameter-overrides \
              BudgetbotSecretArn="$BUDGETBOT_SECRET_ARN" \
              BudgetbotKmsKeyArn="$BUDGETBOT_KMS_KEY_ARN" \
              LegacyKmsKeyArn="$LEGACY_KMS_KEY_ARN" \
              DynamoRecipientsTable="$DYNAMODB_RECIPIENTS_TABLE" \
              DynamoBalanceStateTable="$DYNAMODB_BALANCE_STATE_TABLE" \
              DynamoYnabConnectionsTable="$DYNAMODB_YNAB_CONNECTIONS_TABLE" \
              SpringProfile="$SPRING_PROFILE" \
              DailySchedule="$DAILY_SCHEDULE" \
              DailyScheduleTimezone="$DAILY_SCHEDULE_TIMEZONE"
