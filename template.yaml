AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: BudgetBot serverless stack (HTTP API + schedulers)

Parameters:
  BudgetbotSecretArn:
    Type: String
    Description: Secrets Manager ARN with BudgetBot secrets (JSON)
  BudgetbotKmsKeyArn:
    Type: String
    Description: KMS key ARN used for refresh-token encryption and secret decryption
  LegacyKmsKeyArn:
    Type: String
    Description: Legacy KMS key ARN used to decrypt existing encrypted data
  DynamoRecipientsTable:
    Type: String
  DynamoBalanceStateTable:
    Type: String
  DynamoYnabConnectionsTable:
    Type: String
  SpringProfile:
    Type: String
    Default: prod
  DailySchedule:
    Type: String
    Default: "cron(0 7 * * ? *)"
  DailyScheduleTimezone:
    Type: String
    Default: "Asia/Jerusalem"

Globals:
  Function:
    Timeout: 30
    MemorySize: 1024
    Runtime: java17
    Architectures:
      - x86_64

Resources:
  BudgetbotHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default

  BudgetbotApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: com.lakhmann.budgetbot.LambdaHandler::handleRequest
      Environment:
        Variables:
          BUDGETBOT_SECRET_ARN: !Ref BudgetbotSecretArn
          DYNAMODB_RECIPIENTS_TABLE: !Ref DynamoRecipientsTable
          DYNAMODB_BALANCE_STATE_TABLE: !Ref DynamoBalanceStateTable
          DYNAMODB_YNAB_CONNECTIONS_TABLE: !Ref DynamoYnabConnectionsTable
          SPRING_PROFILES_ACTIVE: !Ref SpringProfile
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:Scan
              Resource:
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${DynamoRecipientsTable}
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${DynamoBalanceStateTable}
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${DynamoYnabConnectionsTable}
            - Effect: Allow
              Action:
                - kms:Encrypt
                - kms:Decrypt
              Resource: !Ref BudgetbotKmsKeyArn
            - Effect: Allow
              Action:
                - kms:Decrypt
              Resource: !Ref LegacyKmsKeyArn
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref BudgetbotSecretArn
      Events:
        RootApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref BudgetbotHttpApi
            Path: /
            Method: ANY
            PayloadFormatVersion: "2.0"
        ProxyApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref BudgetbotHttpApi
            Path: /{proxy+}
            Method: ANY
            PayloadFormatVersion: "2.0"

  PollFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: infra/scheduler
      Handler: poll.handler
      Runtime: nodejs20.x
      MemorySize: 128
      Timeout: 30
      Environment:
        Variables:
          BUDGETBOT_BASE_URL: !Sub "https://${BudgetbotHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
          BUDGETBOT_SECRET_ARN: !Ref BudgetbotSecretArn
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref BudgetbotSecretArn
            - Effect: Allow
              Action:
                - kms:Decrypt
              Resource: !Ref BudgetbotKmsKeyArn

  DailyFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: infra/scheduler
      Handler: daily.handler
      Runtime: nodejs20.x
      MemorySize: 128
      Timeout: 30
      Environment:
        Variables:
          BUDGETBOT_BASE_URL: !Sub "https://${BudgetbotHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
          BUDGETBOT_SECRET_ARN: !Ref BudgetbotSecretArn
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref BudgetbotSecretArn
            - Effect: Allow
              Action:
                - kms:Decrypt
              Resource: !Ref BudgetbotKmsKeyArn

  SchedulerInvokeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: scheduler-invoke-budgetbot
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !GetAtt PollFunction.Arn
                  - !GetAtt DailyFunction.Arn

  PollSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      ScheduleExpression: rate(1 minute)
      FlexibleTimeWindow:
        Mode: "OFF"
      Target:
        Arn: !GetAtt PollFunction.Arn
        RoleArn: !GetAtt SchedulerInvokeRole.Arn

  DailyScheduleRule:
    Type: AWS::Scheduler::Schedule
    Properties:
      ScheduleExpression: !Ref DailySchedule
      ScheduleExpressionTimezone: !Ref DailyScheduleTimezone
      FlexibleTimeWindow:
        Mode: "OFF"
      Target:
        Arn: !GetAtt DailyFunction.Arn
        RoleArn: !GetAtt SchedulerInvokeRole.Arn

Outputs:
  HttpApiId:
    Value: !Ref BudgetbotHttpApi
  ApiBaseUrl:
    Value: !Sub "https://${BudgetbotHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  ApiFunctionName:
    Value: !Ref BudgetbotApiFunction
